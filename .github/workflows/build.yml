name: Build Executable

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  id-token: write  # Required for OIDC
  contents: write  # Ensures GitHub Actions can create releases

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.12']
        include:
          - os: ubuntu-latest
            platform: linux
            extension: ""
          - os: windows-latest
            platform: windows
            extension: ".exe"

    runs-on: ${{ matrix.os }}
    environment: Production

    steps:
      - name: Check out the code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.txt
          pip install --require-hashes -r requirements-build.txt

      - name: Create version file
        run: echo "__version__ = '${{ github.ref_name }}'" > src/version.py

      - name: Create version resource file (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $parts = ([regex]::Matches($version, '\d+')).Value
          $v = @('0', '0', '0', '0')
          for ($i = 0; $i -lt [Math]::Min($parts.Count, 3); $i++) { $v[$i] = $parts[$i] }

          $versionInfo = @"
          # UTF-8
          VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=($($v[0]), $($v[1]), $($v[2]), $($v[3])),
              prodvers=($($v[0]), $($v[1]), $($v[2]), $($v[3])),
              mask=0x3f,
              flags=0x0,
              OS=0x40004,
              fileType=0x1,
              subtype=0x0,
              date=(0, 0)
              ),
            kids=[
              StringFileInfo(
                [
                StringTable(
                  u'040904B0',
                  [StringStruct(u'CompanyName', u'Tapio Measurement Technologies Oy'),
                  StringStruct(u'FileDescription', u'RollView'),
                  StringStruct(u'FileVersion', u'$version'),
                  StringStruct(u'InternalName', u'tapio-rollview'),
                  StringStruct(u'LegalCopyright', u'Copyright (c) Tapio Measurement Technologies Oy'),
                  StringStruct(u'OriginalFilename', u'tapio-rollview.exe'),
                  StringStruct(u'ProductName', u'RollView'),
                  StringStruct(u'ProductVersion', u'$version')])
                ]),
              VarFileInfo([VarStruct(u'Translation', [1033, 1200])])
            ]
          )
          "@

          $versionInfo | Out-File -FilePath "version_info.txt" -Encoding UTF8

      - name: Build executable
        run: >
          pyinstaller
          --clean
          --onefile
          --noconsole
          --add-data "src/postprocessors/:postprocessors/"
          --add-data "src/assets/fonts/:assets/fonts/"
          --add-data "src/locales/:locales/"
          --hidden-import pandas
          --add-data "src/assets/:assets"
          --splash src/assets/splash.png
          --icon src/assets/tapio_favicon.ico
          --version-file version_info.txt
          src/main.py

      - name: Rename executable
        run: >
          mv
          dist/main${{ matrix.extension }}
          dist/rollview-${{ github.ref_name }}-${{ matrix.platform }}${{ matrix.extension }}

      - name: Install SBOM tooling
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Audit runtime dependencies
        if: runner.os == 'Linux'
        run: pip-audit -r requirements.txt --no-deps --disable-pip --cache-dir .cache/pip-audit

      - name: Azure Login (Windows)
        if: runner.os == 'Windows'
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Sign executable (Windows)
        if: runner.os == 'Windows'
        uses: azure/artifact-signing-action@b443cf8ea4124818d2ea9f043cba29fc3ec47b16 # v1
        with:
          endpoint: https://neu.codesigning.azure.net/
          signing-account-name: ${{ secrets.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_ARTIFACT_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}/dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Generate artifact SBOM
        run: >
          python scripts/generate_sbom.py
          --version "${{ github.ref_name }}"
          --platform "${{ matrix.platform }}"
          --commit-sha "${{ github.sha }}"
          --artifact "dist/rollview-${{ github.ref_name }}-${{ matrix.platform }}${{ matrix.extension }}"
          --output "dist/rollview-${{ github.ref_name }}-${{ matrix.platform }}.cdx.json"

      - name: Compress executable (Linux)
        if: runner.os == 'Linux'
        run: |
          zip dist/rollview-${{ github.ref_name }}-${{ matrix.platform }}.zip \
          dist/rollview-${{ github.ref_name }}-${{ matrix.platform }}${{ matrix.extension }}

      - name: Compress executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/rollview-${{ github.ref_name }}-windows.exe" `
          -DestinationPath "dist/rollview-${{ github.ref_name }}-windows.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rollview-${{ github.ref_name }}-${{ matrix.platform }}
          path: |
            dist/rollview-${{ github.ref_name }}-${{ matrix.platform }}${{ matrix.extension }}
            dist/rollview-${{ github.ref_name }}-${{ matrix.platform }}.zip
            dist/rollview-${{ github.ref_name }}-${{ matrix.platform }}.cdx.json

      - name: Clean up version file
        if: always()
        run: rm src/version.py

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download Artifact (Linux)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: rollview-${{ github.ref_name }}-linux
          path: dist/

      - name: Download Artifact (Windows)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: rollview-${{ github.ref_name }}-windows
          path: dist/

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "dist/rollview-${{ github.ref_name }}-linux.zip" \
            "dist/rollview-${{ github.ref_name }}-linux.cdx.json" \
            "dist/rollview-${{ github.ref_name }}-windows.zip" \
            "dist/rollview-${{ github.ref_name }}-windows.cdx.json" \
            "dist/rollview-${{ github.ref_name }}-windows.exe" \
            --title "Release ${{ github.ref_name }}" \
            --notes "" \
            --verify-tag

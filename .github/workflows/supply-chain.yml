name: Supply Chain

on:
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom-and-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install supply-chain tooling
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.txt

      - name: Generate source SBOM
        run: >
          python scripts/generate_sbom.py
          --version "${{ github.sha }}"
          --platform source
          --commit-sha "${{ github.sha }}"
          --output "dist/rollview-${{ github.sha }}-source.cdx.json"

      - name: Upload source SBOM
        uses: actions/upload-artifact@v4
        with:
          name: rollview-source-sbom
          path: dist/rollview-${{ github.sha }}-source.cdx.json

      - name: Audit runtime dependencies
        run: pip-audit -r requirements.txt --no-deps --disable-pip --cache-dir .cache/pip-audit
